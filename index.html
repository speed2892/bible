<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 일 년 성경읽기 차트</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2c4a7c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="성경읽기">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap');
  :root { --primary: #2c4a7c; --accent: #c8a96e; --light: #f5f0e8; --text: #1a1a2e; --muted: #6b6b7a; --border: #d4cfc4; --done-bg: #e8f4e8; --done-check: #2d7a3a; --today-bg: #fff8e8; --today-border: #c8a96e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #e8e4dc; color: var(--text); -webkit-tap-highlight-color: transparent; }
  .page-wrap { max-width: 900px; margin: 2rem auto; background: #fff; padding: 1.8rem 2rem; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,.15); }
  .screen-controls { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .btn { padding: 7px 16px; border-radius: 6px; border: none; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn-print { background: var(--primary); color: #fff; }
  .btn-alarm { background: #7a4a1a; color: #fff; }
  .btn-alarm.active { background: var(--done-check); }
  .btn-reset { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .overall-progress { flex: 1; text-align: right; font-size: 12px; color: var(--muted); }
  .prog-bar-wrap { width: 100%; height: 5px; background: var(--light); border-radius: 4px; margin-bottom: 1.2rem; overflow: hidden; }
  .prog-bar-fill { height: 100%; background: var(--done-check); border-radius: 4px; transition: width .4s; }
  .chart-header { border: 2px solid var(--primary); border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
  .header-top { background: var(--primary); color: #fff; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .header-title { font-family: 'Noto Serif KR', serif; font-size: 19px; font-weight: 600; letter-spacing: 3px; }
  .header-date-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.35); color: #fff; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .header-date-text { font-size: 13px; font-weight: 500; min-width: 180px; text-align: center; }
  .header-today-btn { background: rgba(200,169,110,.3); border: 1px solid rgba(200,169,110,.7); color: #ffe9b0; padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .today-banner { background: var(--today-bg); border-top: 1px solid var(--today-border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .today-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .today-reading { font-size: 14px; font-weight: 600; color: var(--primary); flex: 1; }
  .books-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .book-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #fff; }
  .book-card.today-card { border-color: var(--today-border); box-shadow: 0 0 0 2px rgba(200,169,110,.3); }
  .book-title-row { display: flex; align-items: center; background: var(--light); padding: 4px 7px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .book-name { font-size: 11px; font-weight: 500; color: var(--primary); flex: 1; }
  .chapters-wrap { padding: 4px 5px; display: flex; flex-wrap: wrap; gap: 2px; }
  .ch { width: 14px; height: 14px; border: 1px solid #c8c4bc; border-radius: 2px; font-size: 7.5px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #aaa; }
  .ch.done { background: var(--done-check); border-color: var(--done-check); color: #fff; }
  .ch.today-ch { border-color: var(--today-border); background: var(--today-bg); color: #9a7010; font-weight: 700; }
  .ch.done::after { content: '✓'; } .ch:not(.done)::after { content: attr(data-n); }
  .chart-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--muted); }
  @media (max-width: 600px) { .books-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="screen-controls">
    <button class="btn btn-print" onclick="window.print()">🖨️ A4 인쇄</button>
    <button class="btn btn-alarm" id="alarm-btn" onclick="toggleAlarm()">🔕 알림 설정</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <div id="sync-indicator" style="font-size:11px;color:var(--muted);"><span id="sync-dot" style="width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;"></span> <span id="sync-text">연결 중...</span></div>
    <div class="overall-progress" id="overall-text"></div>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="chart-area">
    <div class="chart-header">
      <div class="header-top">
        <div class="header-title">일 년 성경 읽기 차트</div>
        <div class="header-date-nav"><button class="nav-btn" onclick="shiftDay(-1)">‹</button><div class="header-date-text" id="header-date-text"></div><button class="nav-btn" onclick="shiftDay(1)">›</button><button class="header-today-btn" onclick="goToday()">오늘</button></div>
      </div>
      <div class="today-banner" id="today-banner" onclick="openTodayJW()" title="클릭하면 성경 열기">
        <div class="today-label">오늘 말씀 열기 ↗</div>
        <div class="today-reading" id="today-reading">—</div>
      </div>
    </div>
    <div id="books-container"></div>
    <div class="chart-footer"><span>1번 터치: 체크 | 빠르게 2번 터치: 성경 열기</span><span id="footer-progress"></span></div>
  </div>
</div>

<script>
/* ── 성경 데이터 (URL 매칭을 위해 전체 이름 사용) ── */
const BOOKS = [
  {name:"창세기",ch:50},{name:"출애굽기",ch:40},{name:"레위기",ch:27},{name:"민수기",ch:36},{name:"신명기",ch:34},{name:"여호수아",ch:24},{name:"사사기",ch:21},{name:"룻기",ch:4},{name:"사무엘상",ch:31},{name:"사무엘하",ch:24},{name:"열왕기상",ch:22},{name:"열왕기하",ch:25},{name:"역대상",ch:29},{name:"역대하",ch:36},{name:"에스라",ch:10},{name:"느헤미야",ch:13},{name:"에스더",ch:10},{name:"욥기",ch:42},{name:"시편",ch:150},{name:"잠언",ch:31},{name:"전도서",ch:12},{name:"아가",ch:8},{name:"이사야",ch:66},{name:"예레미야",ch:52},{name:"예레미야애가",ch:5},{name:"에스겔",ch:48},{name:"다니엘",ch:12},{name:"호세아",ch:14},{name:"요엘",ch:3},{name:"아모스",ch:9},{name:"오바댜",ch:1},{name:"요나",ch:4},{name:"미가",ch:7},{name:"나훔",ch:3},{name:"하박국",ch:3},{name:"스바냐",ch:3},{name:"학개",ch:2},{name:"스가랴",ch:14},{name:"말라기",ch:4},{name:"마태복음",ch:28},{name:"마가복음",ch:16},{name:"누가복음",ch:24},{name:"요한복음",ch:21},{name:"사도행전",ch:28},{name:"로마서",ch:16},{name:"고린도전서",ch:16},{name:"고린도후서",ch:13},{name:"갈라디아서",ch:6},{name:"에베소서",ch:6},{name:"빌립보서",ch:4},{name:"골로새서",ch:4},{name:"데살로니가전서",ch:5},{name:"데살로니가후서",ch:3},{name:"디모데전서",ch:6},{name:"디모데후서",ch:4},{name:"디도서",ch:3},{name:"빌레몬서",ch:1},{name:"히브리서",ch:13},{name:"야고보서",ch:5},{name:"베드로전서",ch:5},{name:"베드로후서",ch:3},{name:"요한1서",ch:5},{name:"요한2서",ch:1},{name:"요한3서",ch:1},{name:"유다서",ch:1},{name:"요한계시록",ch:22}
];

// 요청하신 정확한 주소 체계 반영
function jwUrl(bi, chNum){
  const bookName = encodeURIComponent(BOOKS[bi].name);
  return `https://www.jw.org/ko/라이브러리/성경/연구용-성경/책명/${bookName}/${chNum}/`;
}

/* 읽기 계획 및 로직 */
const ALL_CH = []; BOOKS.forEach((b, bi) => { for(let i=0; i<b.ch; i++) ALL_CH.push({bi, ci:i, name:b.name}); });
const DAY_PLAN = []; let cursor = 0;
for(let d=0; d<365; d++){ let cnt = Math.floor(1189/365) + (d < 1189%365 ? 1 : 0); DAY_PLAN.push(ALL_CH.slice(cursor, cursor+cnt)); cursor += cnt; }

let done = new Set(JSON.parse(localStorage.getItem("bible2026_ch") || "[]"));
let viewDate = new Date(); if(viewDate.getFullYear() !== 2026) viewDate = new Date(2026,0,1);

function openTodayJW(){
  const di = Math.floor((viewDate - new Date(2026,0,1))/86400000);
  if(DAY_PLAN[di]) window.open(jwUrl(DAY_PLAN[di][0].bi, DAY_PLAN[di][0].ci+1), "_blank");
}

function render(){
  const di = Math.floor((viewDate - new Date(2026,0,1))/86400000);
  document.getElementById("header-date-text").textContent = viewDate.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
  document.getElementById("today-reading").textContent = DAY_PLAN[di].map(c => `${c.name} ${c.ci+1}장`).join(", ");
  updateProgress(); highlight();
}

function highlight(){ document.querySelectorAll(".ch").forEach(el => { const [bi, ci] = el.id.split("_").slice(1).map(Number); el.classList.toggle("done", done.has(`${bi}_${ci}`)); }); }
function updateProgress(){ const pct = Math.round(done.size / 1189 * 100); document.getElementById("prog-fill").style.width = pct + "%"; document.getElementById("overall-text").textContent = `${done.size.toLocaleString()} / 1,189 완료 (${pct}%)`; }
function toggleCh(bi, ci){ const key = `${bi}_${ci}`; if(done.has(key)) done.delete(key); else done.add(key); localStorage.setItem("bible2026_ch", JSON.stringify([...done])); highlight(); updateProgress(); }

const container = document.getElementById("books-container");
const grid = document.createElement("div"); grid.className = "books-grid";
BOOKS.forEach((b, bi) => {
  const card = document.createElement("div"); card.className = "book-card";
  card.innerHTML = `<div class="book-title-row"><span class="book-name">${b.name}</span></div>`;
  const cw = document.createElement("div"); cw.className = "chapters-wrap";
  for(let ci=0; ci<b.ch; ci++){
    const ch = document.createElement("div"); ch.className = "ch"; ch.id = `ch_${bi}_${ci}`;
    ch.setAttribute("data-n", ci+1);
    let lastTap = 0;
    ch.addEventListener('touchend', function(e){
      let now = new Date().getTime();
      if(now - lastTap < 300) { window.open(jwUrl(bi, ci+1), "_blank"); e.preventDefault(); }
      else { toggleCh(bi, ci); }
      lastTap = now;
    });
    ch.onclick = (e) => { if(e.pointerType !== 'touch') toggleCh(bi, ci); };
    ch.ondblclick = () => { window.open(jwUrl(bi, ci+1), "_blank"); };
    cw.appendChild(ch);
  }
  card.appendChild(cw); grid.appendChild(card);
});
container.appendChild(grid);
render();

function shiftDay(d){ viewDate.setDate(viewDate.getDate()+d); render(); }
function goToday(){ viewDate = new Date(); if(viewDate.getFullYear()!==2026) viewDate = new Date(2026,0,1); render(); }
function resetAll(){ if(confirm("초기화할까요?")) { done.clear(); localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
