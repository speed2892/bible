<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 일 년 성경읽기 차트</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2c4a7c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="성경읽기">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap');

  :root {
    --primary: #2c4a7c;
    --accent: #c8a96e;
    --light: #f5f0e8;
    --text: #1a1a2e;
    --muted: #6b6b7a;
    --border: #d4cfc4;
    --done-bg: #e8f4e8;
    --done-check: #2d7a3a;
    --today-bg: #fff8e8;
    --today-border: #c8a96e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8e4dc;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }

  .page-wrap {
    max-width: 900px;
    margin: 2rem auto;
    background: #fff;
    padding: 1.8rem 2rem;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,.15);
  }

  .screen-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
  }
  .btn-print { background: var(--primary); color: #fff; }
  .btn-alarm { background: #7a4a1a; color: #fff; }
  .btn-alarm.active { background: var(--done-check); }
  .btn-reset { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .overall-progress { flex: 1; text-align: right; font-size: 12px; color: var(--muted); }

  .prog-bar-wrap {
    width: 100%; height: 5px;
    background: var(--light); border-radius: 4px;
    margin-bottom: 1.2rem; overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%; background: var(--done-check);
    border-radius: 4px; transition: width .4s;
  }

  .chart-header {
    border: 2px solid var(--primary);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .header-top {
    background: var(--primary);
    color: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 3px;
  }
  .header-date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.35);
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .header-date-text {
    font-size: 13px;
    font-weight: 500;
    min-width: 180px;
    text-align: center;
  }
  .header-today-btn {
    background: rgba(200,169,110,.3);
    border: 1px solid rgba(200,169,110,.7);
    color: #ffe9b0;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }

  .today-banner {
    background: var(--today-bg);
    border-top: 1px solid var(--today-border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .today-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .today-reading {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    flex: 1;
  }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .book-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
  }
  .book-card.today-card {
    border-color: var(--today-border);
    box-shadow: 0 0 0 2px rgba(200,169,110,.3);
  }
  .book-title-row {
    display: flex;
    align-items: center;
    background: var(--light);
    padding: 4px 7px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .book-name { font-size: 11px; font-weight: 500; color: var(--primary); flex: 1; }
  .chapters-wrap {
    padding: 4px 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .ch {
    width: 14px; height: 14px;
    border: 1px solid #c8c4bc;
    border-radius: 2px;
    font-size: 7.5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #aaa;
  }
  .ch.done { background: var(--done-check); border-color: var(--done-check); color: #fff; }
  .ch.today-ch {
    border-color: var(--today-border);
    background: var(--today-bg);
    color: #9a7010;
    font-weight: 700;
  }
  .ch.done::after { content: '✓'; }
  .ch:not(.done)::after { content: attr(data-n); }

  .chart-footer {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .books-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="screen-controls">
    <button class="btn btn-print" onclick="window.print()">🖨️ A4 인쇄</button>
    <button class="btn btn-alarm" id="alarm-btn" onclick="toggleAlarm()">🔕 알림 설정</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
