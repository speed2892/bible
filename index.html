<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 일 년 성경읽기 차트</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2c4a7c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="성경읽기">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap');

  :root {
    --primary: #2c4a7c;
    --accent: #c8a96e;
    --light: #f5f0e8;
    --text: #1a1a2e;
    --muted: #6b6b7a;
    --border: #d4cfc4;
    --done-bg: #e8f4e8;
    --done-check: #2d7a3a;
    --today-bg: #fff8e8;
    --today-border: #c8a96e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8e4dc;
    color: var(--text);
  }

  .page-wrap {
    max-width: 900px;
    margin: 2rem auto;
    background: #fff;
    padding: 1.8rem 2rem;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,.15);
  }

  /* ── Screen controls ── */
  .screen-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
  }
  .btn-print { background: var(--primary); color: #fff; }
  .btn-print:hover { background: #1e3560; }
  .btn-alarm { background: #7a4a1a; color: #fff; }
  .btn-alarm:hover { background: #5a3410; }
  .btn-alarm.active { background: var(--done-check); }
  .btn-alarm.active:hover { background: #1e5a2a; }
  .btn-reset { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .btn-reset:hover { background: var(--light); }
  .overall-progress { flex: 1; text-align: right; font-size: 12px; color: var(--muted); }

  .prog-bar-wrap {
    width: 100%; height: 5px;
    background: var(--light); border-radius: 4px;
    margin-bottom: 1.2rem; overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%; background: var(--done-check);
    border-radius: 4px; transition: width .4s;
  }

  /* ── Chart header ── */
  .chart-header {
    border: 2px solid var(--primary);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .header-top {
    background: var(--primary);
    color: #fff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 3px;
  }
  .header-date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.35);
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    font-family: inherit;
    line-height: 1;
  }
  .nav-btn:hover { background: rgba(255,255,255,.3); }
  .header-date-text {
    font-size: 13px;
    font-weight: 500;
    min-width: 180px;
    text-align: center;
    letter-spacing: 1px;
  }
  .header-today-btn {
    background: rgba(200,169,110,.3);
    border: 1px solid rgba(200,169,110,.7);
    color: #ffe9b0;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .header-today-btn:hover { background: rgba(200,169,110,.5); }

  /* ── Today's reading banner ── */
  .today-banner {
    background: var(--today-bg);
    border-top: 1px solid var(--today-border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .today-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .today-reading {
    font-size: 13px;
    font-weight: 500;
    color: var(--primary);
    flex: 1;
  }
  .today-reading em {
    font-style: normal;
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
    margin-left: 6px;
  }
  .day-of-year {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Month section headers ── */
  .month-header {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    margin: 10px 0 5px;
    display: inline-block;
    letter-spacing: 2px;
  }

  /* ── Books grid ── */
  .books-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  /* ── Book card ── */
  .book-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
  }
  .book-card.today-card {
    border-color: var(--today-border);
    box-shadow: 0 0 0 2px rgba(200,169,110,.3);
  }
  .book-title-row {
    display: flex;
    align-items: center;
    background: var(--light);
    padding: 4px 7px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    gap: 4px;
  }
  .book-title-row:hover { background: #ede8de; }
  .book-name { font-size: 11px; font-weight: 500; color: var(--primary); flex: 1; }
  .book-chapters-count { font-size: 9.5px; color: var(--muted); white-space: nowrap; }
  .book-done-mark { font-size: 9.5px; color: var(--done-check); font-weight: 700; display: none; margin-left: 2px; }
  .book-card.all-done .book-done-mark { display: inline; }
  .book-card.all-done .book-title-row { background: var(--done-bg); }
  .book-card.all-done .book-name { color: var(--done-check); }

  /* ── Chapters grid ── */
  .chapters-wrap {
    padding: 4px 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .ch {
    width: 14px; height: 14px;
    border: 1px solid #c8c4bc;
    border-radius: 2px;
    font-size: 7.5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #aaa;
    transition: all .1s;
    user-select: none;
    line-height: 1;
  }
  .ch:hover { border-color: var(--primary); color: var(--primary); }
  .ch.done { background: var(--done-check); border-color: var(--done-check); color: #fff; }
  .ch.today-ch {
    border-color: var(--today-border);
    background: var(--today-bg);
    color: #9a7010;
    font-weight: 700;
  }
  .ch.done::after { content: '✓'; }
  .ch:not(.done)::after { content: attr(data-n); }

  /* ── Footer ── */
  .chart-footer {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
  }

  /* ── Print ── */
  @media print {
    @page { size: A4 portrait; margin: 8mm 10mm; }
    body { background: #fff; }
    .screen-controls, .prog-bar-wrap { display: none !important; }
    .page-wrap { margin: 0; padding: 0; box-shadow: none; border-radius: 0; max-width: 100%; }
    .chart-header { border-width: 1.5px; }
    .header-date-nav, .header-today-btn { display: none !important; }
    .header-top { padding: 8px 12px; }
    .header-title { font-size: 17px; }
    .books-grid { grid-template-columns: repeat(5, 1fr); gap: 4px; }
    .ch { width: 12px; height: 12px; font-size: 6.5px; }
    .book-title-row { padding: 3px 5px; }
    .book-name { font-size: 10px; }
    .book-chapters-count { font-size: 8.5px; }
    .chapters-wrap { padding: 3px 4px; gap: 1px; }
    .today-banner { padding: 6px 12px; }
    .today-reading { font-size: 12px; }
    .month-header { font-size: 11px; margin: 7px 0 4px; }
    .book-card.today-card { border-color: #bbb; box-shadow: none; }
    .chart-footer { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="screen-controls">
    <button class="btn btn-print" onclick="window.print()">🖨️ A4 인쇄</button>
    <button class="btn btn-alarm" id="alarm-btn" onclick="toggleAlarm()">🔕 알림 설정</button>
    <div class="alarm-time-wrap" id="alarm-time-wrap" style="display:none;align-items:center;gap:6px;">
      <label style="font-size:12px;color:var(--muted);">알림 시간</label>
      <input type="time" id="alarm-time-input" value="08:00"
        style="font-family:inherit;font-size:13px;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;color:var(--text);background:#fff;cursor:pointer;"
        onchange="changeAlarmTime(this.value)">
    </div>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <div class="overall-progress" id="overall-text"></div>
  </div>
  <div id="alarm-status" style="display:none;font-size:12px;padding:6px 12px;margin-bottom:10px;border-radius:6px;"></div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="chart-area">
    <div class="chart-header">
      <div class="header-top">
        <div class="header-title">일 년 성경 읽기 차트</div>
        <div class="header-date-nav">
          <button class="nav-btn" onclick="shiftDay(-1)" title="전날">&#8249;</button>
          <div class="header-date-text" id="header-date-text"></div>
          <button class="nav-btn" onclick="shiftDay(1)" title="다음날">&#8250;</button>
          <button class="header-today-btn" onclick="goToday()">오늘</button>
        </div>
      </div>
      <div class="today-banner" id="today-banner" style="cursor:pointer;" onclick="openTodayJW()" title="클릭하면 jw.org에서 오늘 말씀 열기">
        <div class="today-label">오늘 읽을 말씀 ↗</div>
        <div class="today-reading" id="today-reading">—</div>
        <div class="day-of-year" id="day-of-year"></div>
      </div>
    </div>

    <div id="books-container"></div>

    <div class="chart-footer">
      <span>클릭 = 체크 &nbsp;|&nbsp; 길게 누르기(모바일) / 더블클릭(PC) = jw.org에서 열기</span>
      <span id="footer-progress"></span>
    </div>
  </div>
</div>

];

function openTodayJW(){
  const di = dayIndex(viewDate);
  if (di < 0 || di >= DAYS) return;
  const chapters = DAY_PLAN[di];
  if (!chapters.length) return;
  // 첫 번째 장을 jw.org에서 열기
  const first = chapters[0];
  window.open(jwUrl(first.bi, first.chNum), "_blank");
}

function jwUrl(bi, chNum){
  return JW_BASE + BOOKS[bi].jw + "/" + chNum + "/";
}

/* 전체 장 목록 펼치기 */
const ALL_CHAPTERS = [];
BOOKS.forEach((b, bi) => {
  for (let ci = 0; ci < b.ch; ci++)
    ALL_CHAPTERS.push({bi, ci, bookName: b.name, chNum: ci+1});
});
const TOTAL_CH = ALL_CHAPTERS.length; // 1189

/* 연간 읽기 계획 빌드 (365일) */
const YEAR = 2026;
const DAYS = 365;
const DAY_PLAN = [];
(function(){
  const base = Math.floor(TOTAL_CH / DAYS);   // 3
  const extra = TOTAL_CH % DAYS;               // 94
  let cursor = 0;
  for (let d = 0; d < DAYS; d++){
    const cnt = base + (d < extra ? 1 : 0);
    DAY_PLAN.push(ALL_CHAPTERS.slice(cursor, cursor + cnt));
    cursor += cnt;
  }
})();

/* 책별 첫 등장 월 캐시 */
const BOOK_MONTH = {};
BOOKS.forEach((_, bi) => {
  for (let d = 0; d < DAYS; d++){
    if (DAY_PLAN[d].some(c => c.bi === bi && c.ci === 0)){
      const dt = new Date(YEAR, 0, 1); dt.setDate(dt.getDate() + d);
      BOOK_MONTH[bi] = dt.getMonth();
      break;
    }
  }
});

/* ── 상태 ── */
const STORE = "bible2026_ch";
let done = new Set(JSON.parse(localStorage.getItem(STORE)||"[]"));
let viewDate = (()=>{
  const t = new Date();
  return t.getFullYear() === YEAR ? t : new Date(YEAR, 0, 1);
})();

function save(){ localStorage.setItem(STORE, JSON.stringify([...done])); }
function key(bi, ci){ return bi+"_"+ci; }

/* ── 날짜 유틸 ── */
const WD = ["일","월","화","수","목","금","토"];
const MN = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

function dayIndex(date){
  return Math.floor((date - new Date(date.getFullYear(), 0, 1)) / 86400000);
}
function formatDate(d){
  return `${d.getFullYear()}년 ${MN[d.getMonth()]} ${d.getDate()}일 (${WD[d.getDay()]})`;
}

function shiftDay(delta){
  const nd = new Date(viewDate);
  nd.setDate(nd.getDate() + delta);
  const min = new Date(YEAR, 0, 1), max = new Date(YEAR, 11, 31);
  if (nd < min || nd > max) return;
  viewDate = nd;
  renderHeader();
  highlightToday();
}
function goToday(){
  const t = new Date();
  viewDate = t.getFullYear() === YEAR ? t : new Date(YEAR, 0, 1);
  renderHeader();
  highlightToday();
}

/* ── 오늘 읽을 말씀 텍스트 ── */
function formatReading(chapters){
  if (!chapters.length) return "—";
  const groups = [];
  let cur = null;
  chapters.forEach(c => {
    if (cur && cur.bi === c.bi && c.ci === cur.endCi+1){
      cur.endCi = c.ci; cur.endNum = c.chNum;
    } else {
      cur = {bookName: c.bookName, startNum: c.chNum, endCi: c.ci, endNum: c.chNum};
      groups.push(cur);
    }
  });
  return groups.map(g =>
    g.startNum === g.endNum
      ? `${g.bookName} ${g.startNum}장`
      : `${g.bookName} ${g.startNum}~${g.endNum}장`
  ).join("&nbsp;&nbsp;/&nbsp;&nbsp;");
}

/* ── 헤더 렌더 ── */
function renderHeader(){
  const di = dayIndex(viewDate);
  const chapters = (di >= 0 && di < DAYS) ? DAY_PLAN[di] : [];
  document.getElementById("header-date-text").textContent = formatDate(viewDate);
  document.getElementById("today-reading").innerHTML =
    `${formatReading(chapters)}<em>(${chapters.length}장)</em>`;
  document.getElementById("day-of-year").textContent = `연중 ${di+1}일째`;
}

/* ── 오늘 장 하이라이트 ── */
function highlightToday(){
  document.querySelectorAll(".ch.today-ch").forEach(el => el.classList.remove("today-ch"));
  document.querySelectorAll(".book-card.today-card").forEach(el => el.classList.remove("today-card"));
  const di = dayIndex(viewDate);
  if (di < 0 || di >= DAYS) return;
  const todaySet = new Set();
  DAY_PLAN[di].forEach(c => {
    const el = document.getElementById("ch_"+c.bi+"_"+c.ci);
    if (el && !el.classList.contains("done")) el.classList.add("today-ch");
    todaySet.add(c.bi);
  });
  todaySet.forEach(bi => {
    const card = document.getElementById("card_"+bi);
    if (card) card.classList.add("today-card");
  });
}

/* ── 진행률 ── */
function updateProgress(){
  const cnt = done.size;
  const pct = Math.round(cnt / TOTAL_CH * 100);
  document.getElementById("overall-text").textContent =
    `${cnt.toLocaleString()} / ${TOTAL_CH.toLocaleString()} 장 완료 (${pct}%)`;
  document.getElementById("footer-progress").textContent =
    `${cnt.toLocaleString()} / ${TOTAL_CH.toLocaleString()} 장`;
  document.getElementById("prog-fill").style.width = pct+"%";
}

/* ── 카드 업데이트 ── */
function updateCard(bi){
  const book = BOOKS[bi];
  for (let ci = 0; ci < book.ch; ci++){
    const el = document.getElementById("ch_"+bi+"_"+ci);
    if (!el) continue;
    const isDone = done.has(key(bi,ci));
    el.classList.toggle("done", isDone);
    if (isDone) el.classList.remove("today-ch");
  }
  const allDone = [...Array(book.ch).keys()].every(ci => done.has(key(bi,ci)));
  document.getElementById("card_"+bi).classList.toggle("all-done", allDone);
  updateProgress();
}

function toggleCh(bi, ci){
  const k = key(bi,ci);
  if (done.has(k)) done.delete(k); else done.add(k);
  save(); updateCard(bi);
}
function toggleBook(bi){
  const allDone = [...Array(BOOKS[bi].ch).keys()].every(ci => done.has(key(bi,ci)));
  for (let ci = 0; ci < BOOKS[bi].ch; ci++){
    if (allDone) done.delete(key(bi,ci)); else done.add(key(bi,ci));
  }
  save(); updateCard(bi);
}
function resetAll(){
  if (!confirm("모든 체크를 초기화할까요?")) return;
  done.clear(); save();
  BOOKS.forEach((_,bi) => updateCard(bi));
}

/* ── DOM 구성 ── */
function build(){
  const container = document.getElementById("books-container");
  const grid = document.createElement("div");
  grid.className = "books-grid";
  container.appendChild(grid);

  BOOKS.forEach((book, bi) => {

    const card = document.createElement("div");
    card.className = "book-card";
    card.id = "card_"+bi;

    const tr = document.createElement("div");
    tr.className = "book-title-row";
    tr.innerHTML = `<span class="book-name">${book.name}</span><span class="book-chapters-count">${book.ch}장</span><span class="book-done-mark">완독</span>`;
    tr.onclick = () => toggleBook(bi);
    card.appendChild(tr);

    const cw = document.createElement("div");
    cw.className = "chapters-wrap";
    for (let ci = 0; ci < book.ch; ci++){
      const ch = document.createElement("div");
      ch.className = "ch"+(done.has(key(bi,ci))?" done":"");
      ch.id = "ch_"+bi+"_"+ci;
      ch.setAttribute("data-n", ci+1);
      ch.title = `${book.name} ${ci+1}장 — 길게 누르면 jw.org에서 열기`;

      // 짧게 클릭 = 체크, 길게 누르기(500ms) = jw.org 열기
      let pressTimer = null;
      let didLongPress = false;

      ch.addEventListener("pointerdown", e => {
        didLongPress = false;
        pressTimer = setTimeout(() => {
          didLongPress = true;
          window.open(jwUrl(bi, ci+1), "_blank");
        }, 500);
      });
      ch.addEventListener("pointerup", () => clearTimeout(pressTimer));
      ch.addEventListener("pointerleave", () => clearTimeout(pressTimer));
      ch.addEventListener("click", e => {
        e.stopPropagation();
        if (!didLongPress) toggleCh(bi, ci);
      });
      // PC: 더블클릭으로 jw.org 열기
      ch.addEventListener("dblclick", e => {
        e.stopPropagation();
        window.open(jwUrl(bi, ci+1), "_blank");
      });

      cw.appendChild(ch);
    }
    card.appendChild(cw);
    grid.appendChild(card);
  });

  updateProgress();
  BOOKS.forEach((_,bi) => {
    const allDone = [...Array(BOOKS[bi].ch).keys()].every(ci => done.has(key(bi,ci)));
    document.getElementById("card_"+bi).classList.toggle("all-done", allDone);
  });
  renderHeader();
  highlightToday();

  // 자정마다 날짜 자동 업데이트
  function scheduleAutoRefresh(){
    const now = new Date();
    const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
    setTimeout(()=>{ goToday(); scheduleAutoRefresh(); }, msToMidnight);
  }
  scheduleAutoRefresh();
}

build();

/* ══════════════════════════════════════
   PWA — Service Worker 등록 & 알림 관리
══════════════════════════════════════ */
const ALARM_STORE      = "bible_alarm_on";
const ALARM_TIME_STORE = "bible_alarm_time"; // "HH:MM"
let swReg = null;

/* 저장된 알림 시간 불러오기 (기본 08:00) */
function getSavedAlarmTime(){
  return localStorage.getItem(ALARM_TIME_STORE) || "08:00";
}
function getAlarmHourMin(){
  const [h, m] = getSavedAlarmTime().split(":").map(Number);
  return {h, m};
}

/* 다음 알림까지 남은 ms */
function msUntilNextAlarm(){
  const {h, m} = getAlarmHourMin();
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next - now;
}

async function initPWA(){
  if (!("serviceWorker" in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register("./sw.js");
    const savedTime = getSavedAlarmTime();
    const isOn = localStorage.getItem(ALARM_STORE) === "1";
    // 시간 input 초기화
    const inp = document.getElementById("alarm-time-input");
    if (inp) inp.value = savedTime;
    if (isOn){
      await ensurePermission();
      sendAlarmMsg({type:"SCHEDULE_ALARM", alarmTime: savedTime});
      updateAlarmUI(true);
    } else {
      updateAlarmUI(false);
    }
  } catch(e){ console.warn("SW 등록 실패:", e); }
}

async function ensurePermission(){
  if (Notification.permission === "granted") return true;
  if (Notification.permission === "denied")  return false;
  return (await Notification.requestPermission()) === "granted";
}

function sendAlarmMsg(msg){
  if (!swReg) return;
  const target = swReg.active || swReg.installing || swReg.waiting;
  if (target) target.postMessage(msg);
}

async function toggleAlarm(){
  if (!("serviceWorker" in navigator)){
    showAlarmStatus("이 브라우저는 알림을 지원하지 않습니다.", "error"); return;
  }
  const isOn = localStorage.getItem(ALARM_STORE) === "1";
  if (isOn){
    sendAlarmMsg({type:"CANCEL_ALARM"});
    localStorage.setItem(ALARM_STORE, "0");
    updateAlarmUI(false);
    showAlarmStatus("알림이 꺼졌습니다.", "off");
  } else {
    const ok = await ensurePermission();
    if (!ok){ showAlarmStatus("알림 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.", "error"); return; }
    if (!swReg) await initPWA();
    const savedTime = getSavedAlarmTime();
    sendAlarmMsg({type:"SCHEDULE_ALARM", alarmTime: savedTime});
    localStorage.setItem(ALARM_STORE, "1");
    updateAlarmUI(true);
    showNextAlarmStatus();
  }
}

/* 알림 시간 변경 */
async function changeAlarmTime(val){
  if (!val) return;
  localStorage.setItem(ALARM_TIME_STORE, val);
  // 알림이 켜져 있으면 즉시 재예약
  if (localStorage.getItem(ALARM_STORE) === "1"){
    sendAlarmMsg({type:"SCHEDULE_ALARM", alarmTime: val});
    showNextAlarmStatus();
  }
}

function showNextAlarmStatus(){
  const {h, m} = getAlarmHourMin();
  const label = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  const ms = msUntilNextAlarm();
  const rh = Math.floor(ms/3600000);
  const rm = Math.floor((ms%3600000)/60000);
  showAlarmStatus(`✅ 매일 ${label} 알림 설정됨 — 다음 알림까지 약 ${rh}시간 ${rm}분`, "on");
}

function updateAlarmUI(on){
  const btn  = document.getElementById("alarm-btn");
  const wrap = document.getElementById("alarm-time-wrap");
  if (!btn) return;
  if (on){
    btn.textContent = "🔔 알림 켜짐";
    btn.classList.add("active");
    if (wrap) wrap.style.display = "flex";
  } else {
    btn.textContent = "🔕 알림 설정";
    btn.classList.remove("active");
    if (wrap) wrap.style.display = "none";
  }
}

function showAlarmStatus(msg, type){
  const el = document.getElementById("alarm-status");
  if (!el) return;
  el.style.display = "block";
  el.textContent   = msg;
  el.style.background = type==="on" ? "#e8f4e8" : type==="error" ? "#fde8e8" : "#f5f0e8";
  el.style.color      = type==="on" ? "#1a5a2a" : type==="error" ? "#8a1a1a" : "#6b6b7a";
  el.style.border     = "1px solid "+(type==="on" ? "#a0d4a0" : type==="error" ? "#f0a0a0" : "#d4cfc4");
  clearTimeout(el._t);
  if (type !== "error") el._t = setTimeout(()=>{ el.style.display="none"; }, 6000);
}

initPWA();
</script>
